# ---- Base extraction: mt_device, mt_topic, mt_message ----
[mikrotik-extract-fields]
SOURCE_KEY = _raw
REGEX      = (?:[<]\d+[>])?[\s]*(?:\S+\s+)?\s*(?P<mt_device>\S+)\s+\[(?P<mt_topic>[^\]]+)\]:\s+(?P<mt_message>.+)
FORMAT     = mt_device::$1 mt_topic::$2 mt_message::$3
MV_ADD     = false

# ---- OVPN: successful login ----
[mikrotik-ovpn-login-success]
SOURCE_KEY = _raw
REGEX      = \[OVPN\]:\s+(?P<mt_user>\S+)\s+logged in,\s+(?P<mt_tunnel_ip>[\d\.]+)\s+from\s+(?P<mt_src_ip>[\d\.]+)
FORMAT     = mt_user::$1 mt_tunnel_ip::$2 mt_src_ip::$3 mt_action::"login" mt_result::success mt_method::ovpn
MV_ADD     = false

# ---- OVPN: failed login ----
[mikrotik-ovpn-login-failed]
SOURCE_KEY = _raw
REGEX      = \[OVPN\]:\s+<(?P<mt_src_ip>[\d\.]+)>:\s+disconnected\s+<user\s+(?P<mt_user>\S+)\s+authentication failed>
FORMAT     = mt_src_ip::$1 mt_user::$2 mt_action::"login" mt_result::failure mt_method::ovpn
MV_ADD     = false

# ---- OVPN: logout ----
[mikrotik-ovpn-logout]
SOURCE_KEY = _raw
REGEX      = \[OVPN\]:\s+(?P<mt_user>\S+)\s+logged out,\s+[\d\s]+from\s+(?P<mt_src_ip>[\d\.]+)
FORMAT     = mt_user::$1 mt_src_ip::$2 mt_action::logout mt_result::success mt_method::ovpn
MV_ADD     = false

# ---- System: successful login (winbox/ssh/api/etc) ----
[mikrotik-system-login-success]
SOURCE_KEY = _raw
REGEX      = \[(?P<mt_topic>[^\]]+)\]:\s+user\s+(?P<mt_user>\S+)\s+logged in from\s+(?P<mt_src_ip>[\d\.]+)\s+via\s+(?P<mt_method>\S+)
FORMAT     = mt_topic::$1 mt_user::$2 mt_src_ip::$3 mt_method::$4 mt_action::"login" mt_result::success
MV_ADD     = false

# ---- System: failed login (winbox/ssh/api/etc) ----
[mikrotik-system-login-failed]
SOURCE_KEY = _raw
REGEX      = \[(?P<mt_topic>[^\]]+)\]:\s+login failure for user\s+(?P<mt_user>\S+)\s+from\s+(?P<mt_src_ip>[\d\.]+)\s+via\s+(?P<mt_method>\S+)
FORMAT     = mt_topic::$1 mt_user::$2 mt_src_ip::$3 mt_method::$4 mt_action::"login" mt_result::failure
MV_ADD     = false

# ---- System: logout (winbox/ssh/api/etc) ----
[mikrotik-system-logout]
SOURCE_KEY = _raw
REGEX      = \[(?P<mt_topic>[^\]]+)\]:\s+user\s+(?P<mt_user>\S+)\s+logged out from\s+(?P<mt_src_ip>[\d\.]+)\s+via\s+(?P<mt_method>\S+)
FORMAT     = mt_topic::$1 mt_user::$2 mt_src_ip::$3 mt_method::$4 mt_action::logout mt_result::success
MV_ADD     = false

# ---- L2TP/PPP: failed auth ----
[mikrotik-l2tp-ppp-failed]
SOURCE_KEY = _raw
REGEX      = \[(?:L2TP|PPP)\]:\s+<(?P<mt_src_ip>[\d\.]+)>:\s+user\s+(?P<mt_user>\S+)\s+authentication failed
FORMAT     = mt_src_ip::$1 mt_user::$2 mt_action::"login" mt_result::failure mt_method::l2tp
MV_ADD     = false
