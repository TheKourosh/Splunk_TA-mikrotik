[mikrotik:syslog]
# ---- Event boundary ----
SHOULD_LINEMERGE = false
LINE_BREAKER    = ([\r\n]+)
TRUNCATE        = 10000

# ---- Timestamp parsing ----
# Fixes RouterOS firmware bug: double dot after timezone e.g. +03:18..
SEDCMD-fix_double_dot   = s/(\+[0-9]{2}:[0-9]{2})\.\./\1 /
TIME_PREFIX             = <[0-9]+>
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%3N%z
MAX_TIMESTAMP_LOOKAHEAD = 50

# ---- Pass 1: extract mt_device, mt_topic, mt_message from _raw ----
REPORT-mikrotik_base = mikrotik-extract-fields

# ---- Pass 2: extract action-specific fields from mt_message ----
REPORT-mikrotik_ovpn_login_success   = mikrotik-ovpn-login-success
REPORT-mikrotik_ovpn_login_failed    = mikrotik-ovpn-login-failed
REPORT-mikrotik_ovpn_logout          = mikrotik-ovpn-logout
REPORT-mikrotik_system_login_success = mikrotik-system-login-success
REPORT-mikrotik_system_login_failed  = mikrotik-system-login-failed
REPORT-mikrotik_system_logout        = mikrotik-system-logout
REPORT-mikrotik_l2tp_ppp_failed      = mikrotik-l2tp-ppp-failed
# ---- CIM aliases ----
FIELDALIAS-src  = mt_src_ip AS src
FIELDALIAS-user = mt_user   AS user
FIELDALIAS-dest = mt_device AS dest
